# ---------------------------------------------------------------------------
# Canonical scenarios (PRD open question #2 — working set)
# ---------------------------------------------------------------------------
scenarios:
  hormuz_50:
    name: "Hormuz partial closure (50% / 30d)"
    kind: chokepoint_cut
    chokepoint: hormuz
    cut_pct: 50
    duration_days: 30
  redsea_suspension:
    name: "Red Sea transit suspension (80% / 45d)"
    kind: chokepoint_cut
    chokepoint: bab_el_mandeb
    cut_pct: 80
    duration_days: 45
  opec_cut:
    name: "OPEC+ emergency cut (1.5 Mbpd / 60d)"
    kind: supply_cut
    volume_kbd: 1500
    duration_days: 60
