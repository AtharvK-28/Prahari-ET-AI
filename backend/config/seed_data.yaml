# ============================================================================
# PRAHARI seed knowledge graph — India crude supply chain (Hackathon MVP)
# DATA HONESTY RULE (NFR3): every figure below is curated from public sources
# (PPAC, EIA, ISPRL, press) and is marked TO-VERIFY before the pitch.
# This is the single source of truth for the KG + geospatial twin.
# ============================================================================

meta:
  version: "0.1"
  status: to-verify
  sources: [PPAC, EIA, ISPRL, MoPNG, public press]

# ---------------------------------------------------------------------------
# National context (Oracle parameters)
# ---------------------------------------------------------------------------
national:
  crude_consumption_kbd: 5486        # PPAC-VERIFIED: imports 4936 kbd + ~550 kbd domestic prod
  import_dependency_pct: 90          # PPAC-VERIFIED (crude basis, FY25-26); 88% often quoted on product basis
  import_volume_kbd: 4936            # PPAC-VERIFIED: FY25-26 = 245.8 MMT (see config/derived_ppac.yaml)
  hormuz_transit_share_pct: 42       # 40-45% per problem brief
  commercial_stock_days: 12          # refiner working inventory (to-verify)
  gdp_usd_bn: 4300                   # FY26 nominal (to-verify)
  baseline_brent_usd: 78.0           # static fallback when no live feed
  india_basket_offset_usd: -1.2      # basket vs Brent at baseline
  supply_elasticity: 0.08            # % Brent move per % global supply lost (editable)
  global_supply_kbd: 103000          # world liquid-fuels supply (to-verify)
  fx_inr_usd: 86.0
  power_diesel_share: 0.18           # share of backup/agri power exposed to diesel

# ---------------------------------------------------------------------------
# Crude grades
# ---------------------------------------------------------------------------
crude_grades:
  - {id: basrah_medium,  name: Basrah Medium,   api: 27.9, sulfur: 3.0, category: heavy_sour}
  - {id: basrah_heavy,   name: Basrah Heavy,    api: 23.7, sulfur: 4.1, category: heavy_sour}
  - {id: arab_light,     name: Arab Light,      api: 33.0, sulfur: 1.8, category: medium_sour}
  - {id: arab_heavy,     name: Arab Heavy,      api: 27.5, sulfur: 2.9, category: heavy_sour}
  - {id: murban,         name: Murban,          api: 40.2, sulfur: 0.7, category: light_sweet}
  - {id: upper_zakum,    name: Upper Zakum,     api: 33.9, sulfur: 1.8, category: medium_sour}
  - {id: kuwait_export,  name: Kuwait Export,   api: 30.5, sulfur: 2.6, category: medium_sour}
  - {id: urals,          name: Urals,           api: 31.7, sulfur: 1.7, category: medium_sour}
  - {id: espo,           name: ESPO Blend,      api: 34.8, sulfur: 0.6, category: light_sweet}
  - {id: wti_midland,    name: WTI Midland,     api: 42.0, sulfur: 0.2, category: light_sweet}
  - {id: mars,           name: Mars (US Gulf),  api: 29.5, sulfur: 1.9, category: medium_sour}
  - {id: bonny_light,    name: Bonny Light,     api: 35.0, sulfur: 0.15, category: light_sweet}
  - {id: agbami,         name: Agbami,          api: 47.5, sulfur: 0.04, category: light_sweet}
  - {id: girassol,       name: Girassol,        api: 31.0, sulfur: 0.3, category: medium_sweet}
  - {id: tupi,           name: Tupi,            api: 28.5, sulfur: 0.35, category: medium_sweet}
  - {id: liza,           name: Liza,            api: 32.0, sulfur: 0.5, category: medium_sweet}
  - {id: oman_export,    name: Oman Export,     api: 30.5, sulfur: 1.4, category: medium_sour}
  - {id: qatar_marine,   name: Qatar Marine,    api: 32.0, sulfur: 1.6, category: medium_sour}

# ---------------------------------------------------------------------------
# Chokepoints (geospatial twin anchors)
# ---------------------------------------------------------------------------
chokepoints:
  - id: hormuz
    name: Strait of Hormuz
    lat: 26.57
    lon: 56.25
    india_import_share_pct: 42        # share of India's crude imports transiting
    monitor_bbox: [[24.5, 54.0], [27.5, 58.5]]   # [[latS,lonW],[latN,lonE]] AIS box
  - id: bab_el_mandeb
    name: Bab el-Mandeb
    lat: 12.58
    lon: 43.33
    india_import_share_pct: 12        # Urals via Suez + some WAF via Red Sea (to-verify)
    monitor_bbox: [[11.0, 42.0], [14.0, 44.5]]
  - id: suez
    name: Suez Canal / SUMED
    lat: 30.45
    lon: 32.35
    india_import_share_pct: 10
    monitor_bbox: [[29.5, 32.0], [31.5, 33.0]]
  - id: malacca
    name: Strait of Malacca
    lat: 2.50
    lon: 101.0
    india_import_share_pct: 4         # ESPO share (to-verify)
    monitor_bbox: [[1.0, 99.5], [4.0, 103.5]]

