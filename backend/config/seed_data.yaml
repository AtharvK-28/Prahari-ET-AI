# ---------------------------------------------------------------------------
# SPR sites (ISPRL Phase I) — 5.33 MMT total ≈ 39 Mbbl ≈ 9.5 days cover
# ---------------------------------------------------------------------------
spr_sites:
  - {id: visakhapatnam_spr, name: "Visakhapatnam SPR", lat: 17.68, lon: 83.28, capacity_mmt: 1.33, fill_pct: 92}
  - {id: mangalore_spr,     name: "Mangalore SPR",     lat: 12.92, lon: 74.88, capacity_mmt: 1.50, fill_pct: 70}
  - {id: padur_spr,         name: "Padur SPR",         lat: 13.13, lon: 74.77, capacity_mmt: 2.50, fill_pct: 62}

spr:
  mmt_to_mbbl: 7.33                  # tonnes->bbl for India-basket avg density
  max_daily_release_kbd: 550         # combined pipeline/SPM evacuation limit (to-verify)
  reserve_floor_pct: 30              # Custodian must keep >= 30% of total capacity

